# ───────────────────────────────────────────
# 扩展点（customization_points.md 详）
# ───────────────────────────────────────────
extension_points:
  - id: EP-01
    name: 改"选员工"过滤维度
    location: RenewBatchBillPlugin.itemClick:122-165
    difficulty: ⭐⭐
    cs_ref: CS-02
    desc: 默认按 affiliationord·客户可改职级/雇佣类型/合同到期日

  - id: EP-02
    name: 加 ISV 主表自定义字段
    location: dym + BillPlugin + OpPlugin.onPreparePropertys 三处联动
    difficulty: ⭐
    cs_ref: CS-03
    desc: 加批次说明 / 备注 / 标签等字段

  - id: EP-03
    name: 改"按子组织递归"逻辑
    location: AdminOrgHrUtils.getLowerOrgIds:24-46
    difficulty: ⭐⭐⭐
    cs_ref: 未列 CS·见 07_ext_points.md
    desc: 限定层数 / 跳过虚拟组织 / 加 enable 复合过滤

  - id: EP-04
    name: 接入其他签署系统（替代法大大）
    location: ContractOtherExListPlugin:51-220 + ext2 dym
    difficulty: ⭐⭐⭐⭐
    cs_ref: CS-04
    desc: 并列挂多个 ListPlugin·不继承·主从配置驱动

  - id: EP-05
    name: 改 7 op 行为
    location: RenewBatchOpPlugin.beforeExecute:107-128
    difficulty: ⭐⭐
    cs_ref: CS-06
    desc: 放宽 billstatus 校验 / 加自定义状态校验

  - id: EP-06
    name: 加批次审批工作流
    location: RenewBatchOpPlugin.afterExecute + 苍穹 wf 配置
    difficulty: ⭐⭐⭐
    cs_ref: CS-05
    desc: 多级审批 HR → 部门长 → CFO·按 currentStep 写不同状态字段

quality_gates:
  - GATE-01: assemble 后所有文件 grep <isv_flag_placeholder>_ = 0 / grep <isv_flag_placeholder>\\. = 0
  - GATE-02: java 包路径与 datamodel 应用路径一致
  - GATE-03: dym BizappId 与 cosmic 环境真值一致
  - GATE-04: deploy_sop.md 必须引用 docx §4.1.2（如有 docx）
  - GATE-05: 11md 全部精修完成·锚点 file:line 100% 真扫
  - GATE-06: 6 EP 在 customization_points.md 全部展开·有改造范式 + 风险

layout:
