- 'GATE-01: assemble 后所有文件 grep <isv_flag_placeholder>_ = 0'
- 'GATE-02: java 包路径与 datamodel 应用路径一致'
- 'GATE-03: dym BizappId 与 cosmic 环境真值一致'
- 'GATE-04: deploy_sop.md 必须引用 docx §4.1.2（如有 docx）'
- 'GATE-05: 11md 数据源全部 file:line 真扫·无脑补'
- 'GATE-06: extension_points 全展开·有改造范式 + 风险'
layout:
  java_root_subpath: af73s/swc/hsasext
  multi_module: true
  primary_module: hpdi_ext
  biz_app_modules:
