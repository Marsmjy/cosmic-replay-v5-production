name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run unit tests
        run: |
          pytest tests/unit -v --tb=short -ra
      
      - name: Generate coverage report
        run: |
          pytest tests/unit --cov=lib --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
  
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run integration tests
        run: |
          pytest tests/integration -v --tb=short -ra
  
  core-tests:
    name: Core Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run core tests
        run: |
          pytest tests/test_core.py -v --tb=short -ra

  har-regression-gate:
    # NOTE: This job validates the regression ENGINE (snapshot summarize / value
    # redaction / diff severity classification) via tests that do NOT need HAR
    # originals. It does NOT run the real HAR baseline compare, because:
    #   - HAR originals carry session tokens / pageIds and are excluded by
    #     .gitignore (must never enter the public repo);
    #   - sanitizing HAR collapses pageIds and changes the extracted snapshot
    #     (steps dropped) -> a baseline from sanitized HAR would be a FALSE gate.
    # The REAL HAR baseline compare runs in the local pre-commit hook on a machine
    # that holds the original HARs:  python scripts/hooks/install_hooks.py
    name: HAR Regression Engine Tests (no real HAR compare; see local pre-commit hook)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Note on real HAR baseline compare
        run: |
          echo "::notice::Real HAR baseline compare is NOT run in CI (HAR originals are gitignored)."
          echo "::notice::It runs in the local pre-commit hook: python scripts/hooks/install_hooks.py"

      - name: Run HAR regression engine + baseline sensitive scan
        run: |
          python scripts/core_regression_gate.py --skip-pytest
          pytest tests/unit/test_har_regression.py tests/unit/test_core_regression_gate.py -v --tb=short -ra

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, core-tests, har-regression-gate]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Core Tests: ${{ needs.core-tests.result }}"
          echo "HAR Regression Gate: ${{ needs.har-regression-gate.result }}"
      
      - name: Fail if any tests failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
