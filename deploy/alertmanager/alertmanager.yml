global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@example.com'
  smtp_auth_username: 'alertmanager@example.com'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
    - match:
        severity: warning
      receiver: 'warning'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://webhook.example.com/alert'
        send_resolved: true

  - name: 'critical'
    email_configs:
      - to: 'ops-team@example.com'
        headers:
          Subject: '[CRITICAL] cosmic-replay告警'
    slack_configs:
      - channel: '#ops-alerts'
        send_resolved: true

  - name: 'warning'
    email_configs:
      - to: 'dev-team@example.com'
        headers:
          Subject: '[WARNING] cosmic-replay告警'
