global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'cosmic-replay'
    environment: 'production'

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: 'cosmic-replay'
    static_configs:
      - targets: ['cosic-replay-v2:8766']
    metrics_path: '/metrics'
    scrape_interval: 10s
    
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
