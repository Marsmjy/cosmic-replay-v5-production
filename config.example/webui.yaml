# Web UI 偏好
webui:
  port: 8768                 # Web UI 端口（1-65535）
  host: 127.0.0.1            # 监听地址。改 0.0.0.0 暴露给局域网
  open_browser: true         # 启动时自动打开浏览器
  default_env: sit           # 默认选中的环境（对应 envs/sit.yaml 的文件名）

# 日志
logging:
  level: info                # debug / info / warn
  log_dir: ./logs

# 路径（相对 skill 根）
paths:
  cases_dir: ./cases
  har_upload_dir: ./har_uploads