<svg width="180" height="48" viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    
    <!-- 光晕 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 轨道图标 -->
  <g transform="translate(22, 24)">
    <!-- 外轨道 -->
    <ellipse cx="0" cy="0" rx="16" ry="7" 
             fill="none" stroke="url(#logoGrad)" stroke-width="2"
             transform="rotate(-15)" filter="url(#glow)"/>
    
    <!-- 内轨道 -->
    <ellipse cx="0" cy="0" rx="11" ry="5" 
             fill="none" stroke="url(#logoGrad)" stroke-width="1.5"
             stroke-dasharray="2 3" transform="rotate(25)" opacity="0.6"/>
    
    <!-- 中心播放按钮 -->
    <polygon points="-4,-5 -4,5 6,0" fill="url(#logoGrad)" filter="url(#glow)"/>
    
    <!-- 轨道上的星点 -->
    <circle cx="14" cy="-5" r="2" fill="#06B6D4">
      <animate attributeName="cx" values="14;-14;14" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="-5;5;-5" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 文字 COSMIC -->
  <text x="48" y="22" font-family="system-ui, sans-serif" font-size="16" font-weight="700"
        fill="url(#logoGrad)" letter-spacing="2">COSMIC</text>
  
  <!-- 文字 REPLAY -->
  <text x="48" y="35" font-family="system-ui, sans-serif" font-size="10" font-weight="500"
        fill="#94A3B8" letter-spacing="4">REPLAY</text>
  
  <!-- 版本号 -->
  <text x="130" y="35" font-family="monospace" font-size="8" fill="#64748B">v4.0</text>
</svg>