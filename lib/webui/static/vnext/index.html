<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cosmic Replay vNext</title>
  <link rel="stylesheet" href="/static/vnext/styles/tokens.css?v=20260615-2">
  <link rel="stylesheet" href="/static/vnext/styles/workspace.css?v=20260616-3">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="/" aria-label="Cosmic Replay 首页">
        <span class="brand-mark">CR</span>
        <span><strong>Cosmic Replay</strong><small>vNext</small></span>
      </a>
      <nav id="primary-nav" class="primary-nav" aria-label="主导航"></nav>
      <div class="topbar-actions">
        <label class="environment-field">
          <span>目标环境</span>
          <select id="environment-select" aria-label="目标环境"></select>
        </label>
        <span id="api-health" class="health-status">连接中</span>
        <a href="/legacy" class="text-link">旧版</a>
      </div>
    </header>

    <aside id="case-browser" class="case-browser" aria-label="用例库"></aside>

    <main class="workspace">
      <header id="context-header" class="context-header"></header>
      <nav id="case-tabs" class="case-tabs" aria-label="用例详情导航"></nav>
      <div id="notice-region" class="notice-region" aria-live="polite"></div>
      <section id="workspace-content" class="workspace-content"></section>
    </main>

    <aside id="readiness-panel" class="readiness-panel" aria-label="执行就绪检查"></aside>
  </div>
  <script type="module">
    import("/static/vnext/js/app.js?v=20260616-4").catch((error) => {
      console.error("vNext bootstrap failed", error);
      const region = document.querySelector("#notice-region");
      if (region) region.innerHTML = `<div class="notice is-error">前端模块加载失败：${error.message}</div>`;
    });
  </script>
</body>
</html>
