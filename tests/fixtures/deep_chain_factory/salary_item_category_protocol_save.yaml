name: deep_salary_item_category_protocol_save
description: 受控写入【薪酬项目类别】 · Playwright 探链路 + runner 协议保存闭环
env:
  base_url: ${env:COSMIC_BASE_URL:https://feature.kingdee.com:1026/feature_sit_hrpro}
  username: ${env:COSMIC_USERNAME}
  password: ${env:COSMIC_PASSWORD}
  datacenter_id: ${env:COSMIC_DATACENTER_ID}
vars:
  test_number: "CRPLY_CAT_${rand:6}"
  test_name: "CRPLY薪酬项目类别${rand:6}"
vars_labels:
  test_number: 编码
  test_name: 名称
vars_meta:
  test_number:
    label: 编码
    field_key: number
    form_id: hsbs_statisticstag
    form_label: 薪酬项目类别
    group_key: "hsbs_statisticstag:click_save"
    group_label: 薪酬项目类别 / 保存
    source_step_id: fill_required_fields
    write_step_id: click_save
  test_name:
    label: 名称
    field_key: name
    form_id: hsbs_statisticstag
    form_label: 薪酬项目类别
    group_key: "hsbs_statisticstag:click_save"
    group_label: 薪酬项目类别 / 保存
    source_step_id: fill_required_fields
    write_step_id: click_save
pick_fields:
  pick_taglevel_id:
    value_id: "1758628928047679488"
    value_name: 一级
    value_code: 1001_S
    value_number: 1001_S
    recorded_value_id: "1758628928047679488"
    label: 薪酬项目类别层级
    env_sensitive: medium
    field_key: taglevel
    form_id: hsbs_statisticstag
    app_id: hsbs
    auto_resolve: false
    resolve_by: recorded_lookup
    resolve_status: manual
    form_label: 薪酬项目类别
    group_key: "hsbs_statisticstag:click_save"
    group_label: 薪酬项目类别 / 保存
    source_step_id: pick_taglevel
    write_step_id: click_save
  env_click_tblnew_treeview_focus:
    value_id: 8609760E-EF83-4775-A9FF-CCDEC7C0B689
    value_name: 全部
    label: 新增上下文组织
    env_sensitive: high
    field_key: treeview.focus.id
    form_id: hsbs_statisticstag
    app_id: hsbs
    auto_resolve: false
    resolve_by: ""
    resolve_status: manual
    form_label: 薪酬项目类别
    group_key: "hsbs_statisticstag:context"
    group_label: 薪酬项目类别 / 表单维护
    source_step_id: click_tblnew
    write_step_id: ""
main_form_id: hsbs_statisticstag
steps:
  - id: open_portal
    type: open_form
    form_id: bos_portal_myapp_new
    app_id: bos
    description: 打开「门户首页」
  - id: menuItemClick_salary_item_category
    type: invoke
    form_id: bos_portal_myapp_new
    app_id: bos
    ac: menuItemClick
    key: appnavigationmenuap
    method: menuItemClick
    args:
      - menuId: "1874768016756056064"
        appId: /UHMBBGZQ65X
        cloudId: /U+QDTL900//
    post_data:
      - {}
      - []
    target_form: hsbs_statisticstag
    target_forms:
      - hsas_apphome
      - hsbs_statisticstag
    env_sensitive: high
    resolve_by: menu_path_or_form
    navigation_form_id: hsbs_statisticstag
    description: 点击菜单进入「薪酬项目类别」
  - id: selectTab_salary_item_category
    type: invoke
    form_id: home_page
    app_id: bos
    ac: selectTab
    key: tabap
    method: selectTab
    args:
      - hsasroot${session.root_base_id}
    post_data:
      - {}
      - []
    optional: true
    description: 切换到薪资核算 tab
  - id: load_statisticstag_list
    type: invoke
    form_id: hsbs_statisticstag
    app_id: hsbs
    ac: loadData
    key: ""
    method: loadData
    args: []
    post_data: []
    preserve_l2_page: true
    description: 加载「薪酬项目类别」列表
  - id: click_tblnew
    type: invoke
    form_id: hsbs_statisticstag
    app_id: hsbs
    ac: new
    key: toolbarap
    method: itemClick
    args:
      - tblnew
      - new
    post_data:
      - treeview:
          focus:
            id: 8609760E-EF83-4775-A9FF-CCDEC7C0B689
            parentid: ""
            text: 全部
            isParent: true
      - []
    preserve_l2_page: true
    description: 点击「新增」
  - id: load_statisticstag_edit
    type: invoke
    form_id: hsbs_statisticstag
    app_id: hsbs
    ac: loadData
    key: ""
    method: loadData
    args: []
    post_data: []
    description: 加载「薪酬项目类别」编辑态
  - id: fill_required_fields
    type: update_fields
    form_id: hsbs_statisticstag
    app_id: hsbs
    fields:
      number: ${vars.test_number}
      name:
        zh_CN: ${vars.test_name}
        zh_TW: ${vars.test_name}
    description: 填写「编码/名称」
  - id: pick_taglevel
    type: pick_basedata
    form_id: hsbs_statisticstag
    app_id: hsbs
    field_key: taglevel
    value_id: ${vars.pick_taglevel_id}
    value_name: 一级
    value_code: 1001_S
    value_number: 1001_S
    prefetch_lookup: true
    prefetch_lookup_args:
      - ["%", "", "%", 0, 1, 50]
    description: 选择「薪酬项目类别层级」
  - id: click_save
    type: invoke
    form_id: hsbs_statisticstag
    app_id: hsbs
    ac: click
    key: btnsave
    method: click
    args: []
    post_data:
      - {}
      - []
    description: 💾 点击【保存】按钮
assertions:
  - type: no_save_failure
    step: click_save
  - type: no_error_actions
    step: click_save
