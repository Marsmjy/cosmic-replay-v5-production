[pytest]
# pytest配置文件

# 测试发现
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = tests

# 命令行选项
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# 标记
markers =
    slow: 慢速测试，需要较长时间
    integration: 集成测试
    e2e: 端到端测试
    unit: 单元测试
    requires_cosmic: 需要Cosmic环境

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S

# 文件日志
log_file = logs/test-run.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s

# 覆盖率配置（使用pytest-cov）
# 运行: pytest --cov=lib --cov-report=html --cov-report=term

# 忽略警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::urllib3.exceptions.InsecureRequestWarning

# 最小版本
minversion = 7.0
